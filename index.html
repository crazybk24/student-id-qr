<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Student ID - QR Generator</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="page-wrapper">
            <div class="card">
                <div class="card-header">
                    <div class="logo-circle"><i class="fas fa-graduation-cap"></i></div>
                    <div>
                        <h1>Student ID</h1>
                        <p>QR Code Generator</p>
                    </div>
                </div>
                <div class="card-body">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input id="name" placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-building"></i>
                        <input id="dept" placeholder="Department">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input id="enrol" placeholder="Enrolment Number">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-calendar"></i>
                        <input id="dob" type="date">
                    </div>
                    <div class="photo-upload-group" onclick="document.getElementById('photo').click()">
                        <i class="fas fa-camera"></i>
                        <span id="photo-label">Upload Photo</span>
                        <input type="file" id="photo" accept="image/*" style="display:none" onchange="previewPhoto(this)">
                    </div>
                    <div id="photo-preview-box" style="display:none">
                        <img id="photo-preview" src="" alt="Preview">
                        <span>Photo selected ✓</span>
                    </div>
                    <button onclick="generateQR()">
                        <i class="fas fa-qrcode"></i> Generate QR Code
                    </button>
                    <div id="imgbox">
                        <p class="qr-label">Scan to verify student</p>
                        <img id="qrimage" src="" alt="QR code">
                    </div>
                </div>
            </div>
        </div>

        <script>
            const $ = id => document.getElementById(id);

            function previewPhoto(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        $('photo-preview').src = e.target.result;
                        $('photo-preview-box').style.display = 'flex';
                        $('photo-label').textContent = input.files[0].name;
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            }

            function generateQR() {
                const name = $('name').value.trim();
                const dept = $('dept').value.trim();
                const enrol = $('enrol').value.trim();
                const dob = $('dob').value;
                if (!name || !dept || !enrol || !dob) return alert('Fill all fields');
                const qrData = encodeURIComponent(`card.html?name=${name}&dept=${dept}&enrol=${enrol}&dob=${dob}`);
                const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + qrData;
                $('qrimage').src = qrUrl;
                $('imgbox').classList.add('show-img');
            }
        </script>

        </body>
</html>
