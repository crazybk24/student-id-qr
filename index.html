<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Student ID - QR Generator</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="page-wrapper">
            <div class="card">
                <div class="card-header">
                    <div class="logo-circle"><i class="fas fa-graduation-cap"></i></div>
                    <div>
                        <h1>Student ID</h1>
                        <p>QR Code Generator</p>
                    </div>
                </div>
                <div class="card-body">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input id="name" placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-building"></i>
                        <input id="dept" placeholder="Department">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input id="enrol" placeholder="Enrolment or Registration Number">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input id="mobile" placeholder="Mobile Number" type="tel">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-calendar"></i>
                        <input id="dob" type="date">
                    </div>
                    <button onclick="generateQR()">
                        <i class="fas fa-qrcode"></i> Generate QR Code
                    </button>
                    <div id="imgbox">
                        <p class="qr-label">Scan to verify student</p>
                        <img id="qrimage" src="" alt="QR code">
                    </div>
                </div>
            </div>

        </div>

        <script>
            const $ = id => document.getElementById(id);

            function generateQR() {
                const name = $('name').value.trim();
                const dept = $('dept').value.trim();
                const enrol = $('enrol').value.trim();
                const dob = $('dob').value;
                const mobile = $('mobile').value.trim();
                if (!name || !dept || !enrol || !dob || !mobile) return alert('Fill all fields');

                const cardData = `Name: ${name}\nDepartment: ${dept}\nEnrolment: ${enrol}\nDOB: ${dob}\nMobile: ${mobile}`;
                const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(cardData);
                $('qrimage').src = qrUrl;
                $('imgbox').classList.add('show-img');
            }
        </script>

        </body>
</html>
