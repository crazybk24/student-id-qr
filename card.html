<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Student ID Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .id-card {
            width: 380px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .id-card-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
        }
        .id-logo {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .id-card-header h2 { font-size: 17px; font-weight: 700; }
        .id-card-header span { font-size: 12px; opacity: 0.85; }
        .id-card-body {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .id-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ede9fe, #c4b5fd);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: #7c3aed;
            flex-shrink: 0;
            overflow: hidden;
        }
        .id-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .id-info { flex: 1; }
        .id-name { font-size: 20px; font-weight: 700; color: #1e1b4b; margin-bottom: 12px; text-transform: capitalize; }
        .id-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; margin-bottom: 7px; }
        .id-row i { color: #4f46e5; width: 14px; }
        .id-card-footer {
            background: #f5f3ff;
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #7c3aed;
            font-weight: 600;
            letter-spacing: 1px;
            border-top: 1px solid #ede9fe;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="id-card">
        <div class="id-card-header">
            <div class="id-logo"><i class="fas fa-graduation-cap"></i></div>
            <div>
                <h2>Student Identity Card</h2>
                <span>Academic Year 2025-26</span>
            </div>
        </div>
        <div class="id-card-body">
            <div class="id-avatar">
                <i class="fas fa-user-graduate" id="avatar-icon"></i>
            </div>
            <div class="id-info">
                <div class="id-name" id="card-name">-</div>
                <div class="id-row"><i class="fas fa-building"></i><span id="card-dept">-</span></div>
                <div class="id-row"><i class="fas fa-id-card"></i><span id="card-enrol">-</span></div>
                <div class="id-row"><i class="fas fa-calendar-alt"></i><span id="card-dob">-</span></div>
                <div class="verified-badge"><i class="fas fa-check-circle"></i> Verified Student</div>
            </div>
        </div>
        <div class="id-card-footer">Valid Student &bull; Academic Year 2025-26</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('card-name').textContent = params.get('name') || '-';
        document.getElementById('card-dept').textContent = params.get('dept') || '-';
        document.getElementById('card-enrol').textContent = params.get('enrol') || '-';
        document.getElementById('card-dob').textContent = params.get('dob') || '-';
    </script>
</body>
</html>
